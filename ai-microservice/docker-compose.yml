

services:
  # The Backend Service
  ai-server:
    build: ./server
    restart: always
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    # We don't map ports here because only Nginx should talk to them
    deploy:
      replicas: 3 # Spins up 3 identical instances

  # The Load Balancer
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80" # Map host port 8080 to Nginx port 80
    depends_on:
      - ai-server